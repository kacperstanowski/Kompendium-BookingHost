<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafik pracy | BookingHost</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#00C2B3;--teal-dark:#009E92;--teal-dim:rgba(0,194,179,0.12);
  --navy:#0D1B2A;--navy-mid:#152234;
  --bg:#F2F6FA;--surface:#fff;--text:#0D1B2A;--text-2:#5A6B7C;
  --border:#DDE6EE;--r:14px;
  --shadow-sm:0 2px 8px rgba(13,27,42,0.06);
  --shadow:0 12px 40px rgba(13,27,42,0.15);
  --hh:64px;
  --md-ur:#E8A317;--md-ur-bg:rgba(232,163,23,0.14);
  --md-gray:#5A6B7C;--md-gray-bg:rgba(90,107,124,0.10);
  --et-c:#0D1B2A;--et-bg:rgba(13,27,42,0.08);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.5;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;height:var(--hh);background:linear-gradient(90deg,var(--navy),var(--navy-mid));border-bottom:1px solid rgba(255,255,255,0.06);box-shadow:0 1px 0 rgba(0,194,179,0.15),0 4px 24px rgba(0,0,0,0.25);display:flex;align-items:center;padding:0 24px;gap:12px}
.logo-box{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:0.82rem;box-shadow:0 0 18px rgba(0,194,179,0.4);flex-shrink:0}
.logo-ttl{color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem}
.hdr-div{color:rgba(255,255,255,0.2);padding:0 6px}
.hdr-sub{color:rgba(255,255,255,0.5);font-size:0.86rem}
.hdr-sep{flex:1}
.btn-sh{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);padding:7px 14px;border-radius:8px;font-size:0.82rem;font-weight:500;text-decoration:none;transition:all .2s;white-space:nowrap;font-family:'Instrument Sans',sans-serif}
.btn-sh:hover{background:rgba(0,194,179,0.15);border-color:rgba(0,194,179,0.35);color:#fff}

/* PAGE */
.pw{max-width:1240px;margin:0 auto;padding:26px 20px 60px}
.tb{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.pg-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:1.45rem;color:var(--navy)}
.tb-sep{flex:1}

/* PICKER GROUP */
.pp-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pp-wrap{position:relative}
.pp-btn{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);color:var(--navy);padding:8px 14px;border-radius:10px;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .18s;box-shadow:var(--shadow-sm);white-space:nowrap}
.pp-btn:hover{border-color:var(--teal);color:var(--teal-dark)}
.pp-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.pp-btn svg{opacity:0.65;flex-shrink:0}
.pp-btn.active svg{opacity:0.85}
.pp-lbl-sec{font-size:0.72rem;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em}
.pp-btn.active .pp-lbl-sec{color:rgba(255,255,255,0.6)}

/* POPOVER */
.pp-pop{position:absolute;top:calc(100% + 6px);right:0;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:16px;display:none}
.pp-pop.open{display:block}

/* MONTH PICKER */
.mp-pop{min-width:280px}
.mp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mp-year{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:var(--navy)}
.mp-nav-btn{width:28px;height:28px;border-radius:6px;border:none;background:none;color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mp-nav-btn:hover{background:var(--bg);color:var(--navy)}
.mp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mp-cell{padding:10px 8px;text-align:center;border-radius:8px;font-size:0.84rem;font-weight:500;color:var(--text);cursor:pointer;transition:all .12s;user-select:none;border:1px solid transparent}
.mp-cell:hover:not(.mp-disabled){background:var(--teal-dim);color:var(--teal-dark)}
.mp-cell.mp-disabled{color:rgba(0,0,0,0.2);cursor:not-allowed}
.mp-cell.mp-current{border-color:var(--teal);color:var(--teal-dark);font-weight:700}
.mp-cell.mp-selected{background:var(--teal);color:#fff;font-weight:700}

/* DAY PICKER */
.dp-pop{min-width:300px}
.dp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.dp-nav-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:0.95rem;color:var(--navy);padding:4px 8px}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-dow{text-align:center;font-size:0.68rem;font-weight:600;color:var(--text-2);padding:6px 0;text-transform:uppercase;letter-spacing:.04em}
.dp-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:0.84rem;font-weight:500;color:var(--text);border-radius:8px;cursor:pointer;transition:all .12s;user-select:none;position:relative;min-height:34px}
.dp-cell:hover:not(.dp-empty):not(.dp-disabled){background:var(--teal-dim)}
.dp-cell.dp-empty,.dp-cell.dp-disabled{color:rgba(0,0,0,0.2);cursor:default}
.dp-cell.dp-today{border:2px solid var(--teal);font-weight:700;color:var(--teal-dark)}
.dp-cell.dp-selected{background:var(--teal);color:#fff;font-weight:700}
.dp-cell.dp-has-data::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--teal)}
.dp-cell.dp-selected.dp-has-data::after{background:#fff}
.dp-footer{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:0.75rem;color:var(--text-2)}

/* SUMMARY CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:11px;margin-bottom:20px}
.sc{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:15px 18px;box-shadow:var(--shadow-sm)}
.sl{font-size:0.7rem;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.sv{font-family:'Outfit',sans-serif;font-weight:700;font-size:1.4rem;color:var(--navy);line-height:1.1}
.sv-split{display:flex;align-items:baseline;gap:6px}
.sv-big{font-size:1.4rem;font-family:'Outfit',sans-serif;font-weight:700}
.sv-sep{color:var(--text-2);font-size:0.95rem;font-weight:500}
.sv-total{font-size:1rem;color:var(--text-2);font-family:'Outfit',sans-serif;font-weight:600}
.ss{font-size:0.73rem;color:var(--text-2);margin-top:3px}

/* DAY HEADER ROW */
.day-hdr{margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.day-hdr-info{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;flex-shrink:0}
.day-hdr-d{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:var(--navy)}
.day-hdr-s{color:var(--text-2);font-size:0.82rem}
.day-hdr-search{position:relative;flex:1;min-width:200px;max-width:460px;margin:0 auto}
.day-hdr-search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-2);opacity:0.55;pointer-events:none}
.day-hdr-search .si{padding:10px 14px 10px 42px;min-width:0;width:100%;font-size:0.9rem;border:1.5px solid var(--border);border-radius:10px;box-shadow:var(--shadow-sm)}
.day-hdr-search .si:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,194,179,0.15)}
.day-hdr-filters{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}

/* FILTER CONTROLS */
.si{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:0.84rem;font-family:'Instrument Sans',sans-serif;outline:none;transition:border-color .18s}
.si:focus{border-color:var(--teal)}
.si::placeholder{color:var(--text-2);opacity:0.7}
.fb{padding:6px 13px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:0.82rem;font-weight:500;cursor:pointer;transition:all .18s;font-family:'Instrument Sans',sans-serif;white-space:nowrap}
.fb:hover{border-color:var(--teal);color:var(--teal-dark)}
.fb.on{background:var(--teal);border-color:var(--teal);color:#fff}

/* TABLE */
.tw{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden}
.ts{overflow-x:auto}
.td-tbl{width:100%;border-collapse:collapse;background:var(--surface)}
.td-tbl th{background:var(--navy);color:rgba(255,255,255,0.75);padding:11px 14px;text-align:left;font-family:'Outfit',sans-serif;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.td-tbl th.ctr{text-align:center}
.td-tbl td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:0.88rem;vertical-align:middle}
.td-tbl td.ctr{text-align:center}
.td-tbl tbody tr:hover td{background:#EEF5FB}
.td-tbl tbody tr:nth-child(even) td{background:#FAFCFE}
.td-tbl tbody tr:nth-child(even):hover td{background:#EEF5FB}
.td-name{font-weight:600;color:var(--navy);white-space:nowrap}
.td-time{font-family:'Outfit',sans-serif;font-weight:600;font-size:0.92rem;color:var(--navy);white-space:nowrap}
.td-hours{font-family:'Outfit',sans-serif;font-weight:700;color:var(--navy);white-space:nowrap}
.td-empty{padding:32px;text-align:center;color:var(--text-2)}
.td-urlop-dash{color:rgba(0,0,0,0.22)}
.td-tbl tr.row-urlop td{color:var(--text-2)}
.td-tbl tr.row-urlop td.td-name{color:var(--text-2);font-weight:500}

/* BADGES */
.mode-badge{display:inline-block;font-size:0.7rem;font-weight:700;padding:3px 9px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.m-on,.m-bi,.m-br{background:var(--md-gray-bg);color:var(--md-gray)}
.m-ur{background:var(--md-ur-bg);color:var(--md-ur)}
.m-nn{color:var(--text-2);font-size:0.82rem;font-style:italic}
.etat-badge{display:inline-block;font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:5px;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;background:var(--et-bg);color:var(--et-c)}

/* PROGRESS BAR */
.pg-cell{display:flex;flex-direction:column;gap:3px;min-width:140px}
.pg-wrap{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.pg-bar{height:100%;border-radius:3px;background:var(--teal)}
.pg-bar.v-over{background:linear-gradient(90deg,var(--teal),var(--teal-dark))}
.pg-pct{font-size:0.7rem;color:var(--text-2);font-family:'Outfit',sans-serif;font-weight:600}

/* NO DATA */
.no-today{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow-sm);padding:40px;text-align:center;color:var(--text-2)}
.no-today-big{font-family:'Outfit',sans-serif;font-weight:700;font-size:1.1rem;color:var(--navy);margin-bottom:6px}

/* ═══ CALENDAR VIEW ═══ */
.cal-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.cal-emp-select{position:relative}
.cal-emp-btn{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--teal);color:var(--navy);padding:8px 16px;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .18s;box-shadow:var(--shadow-sm)}
.cal-emp-btn:hover{background:var(--teal-dim)}
.cal-emp-drop{position:absolute;top:calc(100% + 6px);left:0;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);min-width:280px;max-height:360px;overflow-y:auto;display:none}
.cal-emp-drop.open{display:block}
.cal-emp-search-wrap{padding:10px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface)}
.cal-emp-search-wrap input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:0.84rem;font-family:'Instrument Sans',sans-serif;outline:none}
.cal-emp-search-wrap input:focus{border-color:var(--teal)}
.cal-emp-item{padding:10px 16px;cursor:pointer;font-size:0.88rem;color:var(--navy);font-weight:500;transition:background .12s;border-bottom:1px solid rgba(0,0,0,0.04)}
.cal-emp-item:last-child{border-bottom:none}
.cal-emp-item:hover{background:var(--teal-dim);color:var(--teal-dark)}
.cal-emp-item.selected{background:var(--teal);color:#fff}
.cal-nav{display:flex;align-items:center;gap:10px;flex:1;justify-content:center}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text-2)}
.cal-nav-btn:hover{border-color:var(--teal);color:var(--teal-dark);background:var(--teal-dim)}
.cal-month-lbl{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:var(--navy);min-width:160px;text-align:center}
.cal-back-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);color:var(--text-2);cursor:pointer;font-size:0.84rem;font-family:'Instrument Sans',sans-serif;padding:7px 14px;border-radius:8px;transition:all .15s}
.cal-back-btn:hover{background:var(--bg);color:var(--navy);border-color:var(--navy)}
.cal-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.cal-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;display:flex;flex-direction:column;gap:2px}
.cal-stat-val{font-family:'Outfit',sans-serif;font-weight:700;font-size:1.1rem;color:var(--navy)}
.cal-stat-lbl{font-size:0.72rem;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.cal-grid{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy)}
.cal-dow{padding:10px 6px;text-align:center;font-family:'Outfit',sans-serif;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:.05em}
.cal-dow.wknd{color:rgba(0,194,179,0.7)}
.cal-weeks{display:flex;flex-direction:column}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--border)}
.cal-cell{border-right:1px solid var(--border);min-height:90px;padding:8px 10px;position:relative;transition:background .12s}
.cal-cell:last-child{border-right:none}
.cal-cell.other-m{background:rgba(242,246,250,0.5)}
.cal-cell.other-m .cal-dnum{color:rgba(0,0,0,0.18)}
.cal-cell.is-today{background:rgba(0,194,179,0.04)}
.cal-cell.is-wknd{background:#F8FAFD}
.cal-cell.is-wknd.other-m{background:rgba(242,246,250,0.7)}
.cal-cell.has-shift{cursor:pointer}
.cal-cell.has-shift:hover{background:rgba(0,194,179,0.07)}
.cal-cell.is-urlop{background:rgba(232,163,23,0.06)}
.cal-dnum{font-family:'Outfit',sans-serif;font-weight:700;font-size:0.88rem;color:var(--navy);margin-bottom:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.is-today .cal-dnum{background:var(--teal);color:#fff}
.cal-shift-block{background:var(--teal-dim);border:1px solid rgba(0,194,179,0.25);border-radius:7px;padding:5px 8px}
.cal-shift-times{font-family:'Outfit',sans-serif;font-weight:700;font-size:0.82rem;color:var(--navy);line-height:1.3}
.cal-shift-hours{font-size:0.72rem;color:var(--text-2);margin-top:1px}
.cal-urlop-block{background:var(--md-ur-bg);border:1px solid rgba(232,163,23,0.25);border-radius:7px;padding:5px 8px}
.cal-urlop-lbl{font-size:0.78rem;font-weight:700;color:var(--md-ur);text-transform:uppercase;letter-spacing:.04em}
.cal-off-lbl{font-size:0.75rem;color:rgba(0,0,0,0.2);font-weight:500;margin-top:4px}
.cal-off-lbl.wknd{color:rgba(0,194,179,0.45);font-weight:600}
.cal-empty-msg{padding:40px;text-align:center;color:var(--text-2);font-size:0.95rem}

/* Status badges */
.st-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.st-badge::before{content:'';width:7px;height:7px;border-radius:50%;flex-shrink:0}
.st-present{background:rgba(34,197,94,0.12);color:#15803D}.st-present::before{background:#22C55E}
.st-before{background:rgba(99,102,241,0.11);color:#4338CA}.st-before::before{background:#6366F1}
.st-after{background:rgba(107,114,128,0.12);color:#374151}.st-after::before{background:#9CA3AF}
.st-urlop{background:rgba(232,163,23,0.14);color:#92610A}.st-urlop::before{background:#E8A317}
/* Urlop calendar */
.ucal-wrap{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden}
.ucal-header-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy)}
.ucal-dow{padding:11px 0;text-align:center;font-family:'Outfit',sans-serif;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:.06em}
.ucal-dow.wknd{color:rgba(0,194,179,0.65)}
.ucal-week-row{position:relative;border-top:1px solid var(--border)}
.ucal-day-grid{display:grid;grid-template-columns:repeat(7,1fr);pointer-events:none}
.ucal-day-cell{border-right:1px solid var(--border);min-height:110px;padding:10px 8px 32px}
.ucal-day-cell:last-child{border-right:none}
.ucal-day-cell.other-m{background:rgba(242,246,250,0.5)}
.ucal-day-cell.is-wknd{background:#F7FAFB}
.ucal-day-cell.is-today{background:rgba(0,194,179,0.04)}
.ucal-day-cell.is-holiday{background:rgba(239,68,68,0.04)}
.ucal-dnum{font-family:'Outfit',sans-serif;font-weight:700;font-size:0.92rem;color:var(--navy);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.ucal-day-cell.other-m .ucal-dnum{color:rgba(0,0,0,0.18)}
.ucal-day-cell.is-today .ucal-dnum{background:var(--teal);color:#fff}
.ucal-holiday-lbl{font-size:0.68rem;font-weight:700;color:#DC2626;text-transform:uppercase;margin-top:4px}
.ucal-bars-layer{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;padding-top:40px}
.ucal-abs-bar{position:absolute;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap;pointer-events:all;cursor:default;opacity:0.93}
.ucal-abs-bar:hover{opacity:1;filter:brightness(1.08)}
.ucal-header-row2{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.ucal-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:var(--navy)}
.ucal-subtitle{color:var(--text-2);font-size:0.84rem}
.ucal-leg-item{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-2);font-weight:500}
.ucal-leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo-box">BH</div>
  <span class="logo-ttl">BookingHost</span>
  <span class="hdr-div">|</span>
  <span class="hdr-sub">Grafik pracy</span>

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLtIuhrHLyaeZyJzuTHn_ncA_4ydS4eMCBeqOhWCf-HvDBML0pz0BC-v91UtpJSAlt/exec";

// Polish month names → number (in nominative — used in sheet names)
const MONTH_NAME_TO_NUM = {
  styczeń:1,luty:2,marzec:3,kwiecień:4,maj:5,czerwiec:6,
  lipiec:7,sierpień:8,wrzesień:9,październik:10,listopad:11,grudzień:12,
  // genitive forms (in case)
  stycznia:1,lutego:2,marca:3,kwietnia:4,maja:5,czerwca:6,
  lipca:7,sierpnia:8,września:9,października:10,listopada:11,grudnia:12
};

function parseTimeStr(v){
  if(!v) return null;
  const s=String(v).trim();
  if(!s||s==='0:00'||s==='00:00') return null;
  const m=s.match(/^(\d{1,2}):(\d{2})/);
  if(m){const h=parseInt(m[1]),mi=parseInt(m[2]);return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0');}
  return null;
}

function parseHours(v){
  if(!v) return 0;
  const s=String(v).trim();
  if(!s||s==='0:00'||s==='00:00') return 0;
  const m=s.match(/^(\d{1,2}):(\d{2})/);
  if(m){const h=parseInt(m[1]),mi=parseInt(m[2]);return Math.round((h+mi/60)*100)/100;}
  return 0;
}

function parseSheetName(name){
  // "Maj_2026" or "Maj 2026" → {label, year, month}
  const m=name.match(/^([A-Za-zŻż]+)[_ ](\d{4})$/);
  if(!m) return null;
  const monthNum=MONTH_NAME_TO_NUM[m[1].toLowerCase()];
  if(!monthNum) return null;
  return {label:m[1]+' '+m[2], year:parseInt(m[2]), month:monthNum-1};
}

function parseSheetData(rows, year){
  // rows[0]: dates row (e.g. "piątek, 1 maja")
  // rows[1]: subheaders (Rozpoczęcie/Koniec/l.godzin/Praca repeating)
  // rows[2..21]: employees
  if(!rows||rows.length<3) return [];
  // Extract date columns from row 0
  const dates=[];
  for(let col=1;col<rows[0].length;col+=4){
    const cell=String(rows[0][col]||'').trim();
    if(!cell) break;
    const m=cell.match(/(\d+)\s+(\w+)/);
    if(m){
      const day=parseInt(m[1]),mn=MONTH_NAME_TO_NUM[m[2].toLowerCase()];
      if(mn) dates.push({col, ds:year+'-'+String(mn).padStart(2,'0')+'-'+String(day).padStart(2,'0')});
    }
  }
  const employees=[];
  for(let ri=2;ri<=21;ri++){
    if(ri>=rows.length) break;
    const row=rows[ri]||[];
    const name=String(row[0]||'').trim();
    if(!name||name.startsWith('DATA:')||name.startsWith('L. ')) continue;
    const days=dates.map(({col,ds})=>{
      const start=parseTimeStr(row[col]);
      const end=parseTimeStr(row[col+1]);
      const hours=parseHours(row[col+2]);
      const mr=String(row[col+3]||'').trim();
      const mode=mr==='Urlop'||mr==='Wolne'?'Urlop':(mr||null);
      return {date:ds,start,end,hours,mode};
    });
    const total=days.reduce((s,d)=>s+d.hours,0);
    employees.push({name,total_hours:Math.round(total*100)/100,days});
  }
  return employees;
}

async function fetchScheduleData(){
  try{
    const res=await fetch(APPS_SCRIPT_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    const months=[];
    Object.entries(json).forEach(([sheetName,rows])=>{
      const meta=parseSheetName(sheetName);
      if(!meta) return;
      const data=parseSheetData(rows, meta.year);
      if(data.length>0) months.push({...meta, data});
    });
    months.sort((a,b)=>a.year-b.year || a.month-b.month);
    return months;
  } catch(e){
    console.error('Error fetching schedule:', e);
    return null;
  }
}

function pd(s){ return new Date(s+'T00:00:00'); }
function fmtDM(s){ const d=pd(s); return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0'); }
function fmtH(h){ const hrs=Math.floor(h),m=Math.round((h-hrs)*60); return m?hrs+'h '+String(m).padStart(2,'0')+'m':hrs+'h'; }
function isWknd(s){ const w=pd(s).getDay(); return w===0||w===6; }
function isToday(s){ return s===todayStr; }
function modeCls(m){ return m==='Online'?'m-on':m==='Biuro'?'m-bi':m==='Brak'?'m-br':m==='Urlop'?'m-ur':''; }
function bdgMode(mode){
  if(!mode||mode==='null'||mode==='None'||mode==='') return '<span class="m-nn">—</span>';
  return `<span class="mode-badge ${modeCls(mode)}">${mode}</span>`;
}
function workingDaysInMonth(y,mo){
  return DATA_SORTED.filter(ds=>{ const d=pd(ds); return d.getFullYear()===y&&d.getMonth()===mo&&d.getDay()!==0&&d.getDay()!==6; }).length;
}
function monthTotalH(emp,y,mo){
  return emp.days.filter(d=>{ if(!d.date) return false; const dt=pd(d.date); return dt.getFullYear()===y&&dt.getMonth()===mo; }).reduce((s,d)=>s+d.hours,0);
}
function classifyEtat(ratio){
  if(ratio>=0.875) return {key:'full',label:'Cały etat', bar:ratio>1.05?'v-over':'' };
  if(ratio>=0.625) return {key:'34',  label:'3/4 etatu', bar:''};
  if(ratio>=0.375) return {key:'12',  label:'1/2 etatu', bar:''};
  if(ratio>=0.125) return {key:'14',  label:'1/4 etatu', bar:''};
  return               {key:'less',label:'Mniej niż 1/4',bar:''};
}
function empEtat(emp,y,mo){
  const wd=workingDaysInMonth(y,mo), norm=wd*8, hours=monthTotalH(emp,y,mo);
  const ratio=norm>0?hours/norm:0;
  return {...classifyEtat(ratio), ratio, hours, norm};
}

  // Build array of cells
  const cells=[];
  for(let i=0;i<off;i++) cells.push({day:prevDays-off+1+i,cur:false});

      const isWkndCell=d>=5;
      const isTodayCell=ds===todayStr;
      const isUrlop=calEmp&&ds&&DATA_DATES.has(ds)&&!hasShift;
      const cls=['cal-cell',!cell.cur?'other-m':'',isTodayCell?'is-today':'',isWkndCell?'is-wknd':'',hasShift?'has-shift':'',isUrlop&&!isWkndCell?'is-urlop':''].filter(Boolean).join(' ');

      } else if(cell.cur&&calEmp){
        if(isWkndCell) inner+='<div class="cal-off-lbl wknd">Wolne</div>';

      rowHtml+=`<div class="${cls}">${inner}</div>`;
    }
    weeksHtml+=`<div class="cal-week">${rowHtml}</div>`;

      <div class="cal-stat"><div class="cal-stat-val">${Math.round(et.ratio*100)}%</div><div class="cal-stat-lbl">Normy (${et.norm}h)</div></div>
      <div class="cal-stat"><div class="cal-stat-val"><span class="etat-badge">${et.label}</span></div><div class="cal-stat-lbl">Forma zatrudnienia</div></div>
    </div>`;
  }

  document.getElementById('v-cal').innerHTML=`
    <div class="cal-header">
      <div class="cal-emp-select">
        <button class="cal-emp-btn" id="calEmpBtn" onclick="this.nextElementSibling.classList.toggle('open');event.stopPropagation()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          ${calEmp?calEmp.name:'Wybierz pracownika'}
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>

function setView(v){
  prevView = curView==='cal'?prevView:curView;
  curView=v;
  document.getElementById('v-day').style.display=v==='day'?'block':'none';
  document.getElementById('v-sum').style.display=v==='sum'?'block':'none';

  document.getElementById('v-urlop').style.display=v==='urlop'?'block':'none';
  document.getElementById('dpBtn').parentElement.style.display=(v==='cal'||v==='urlop')?'none':'block';
  ['mpBtn','calBtn','urlopBtn','dpBtn'].forEach(id=>{ const b=document.getElementById(id); if(b){ b.classList.remove('active'); } });
  if(v==='sum'){ const b=document.getElementById('mpBtn'); if(b) b.classList.add('active'); }
  if(v==='cal'){ const b=document.getElementById('calBtn'); if(b) b.classList.add('active'); }

  const liveMonths = await fetchScheduleData();
  if(liveMonths && liveMonths.length>0){
    // Replace MONTHS_REGISTRY with live data
    MONTHS_REGISTRY.length = 0;
    liveMonths.forEach(m => MONTHS_REGISTRY.push(m));
    AVAIL_MONTHS.clear();
    liveMonths.forEach(m => AVAIL_MONTHS.add(m.year+'-'+m.month));
    // Find current month or latest available month
    const todayY = todayObj.getFullYear(), todayM = todayObj.getMonth();
    let chosen = liveMonths.find(m => m.year===todayY && m.month===todayM);
    if(!chosen) chosen = liveMonths[liveMonths.length-1]; // latest

    selYear = chosen.year;
    selMonth = chosen.month;
    DATA_DATES = new Set(D.flatMap(e=>e.days.map(d=>d.date).filter(Boolean)));
    DATA_SORTED = [...DATA_DATES].sort();

}

// ── buildCalGrid ──
function buildCalGrid(){
  const first=new Date(calYear,calMonth,1);
  let off=first.getDay()-1; if(off<0) off=6;
  const daysInM=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const cells=[];
  for(let i=0;i<off;i++) cells.push({day:prevDays-off+1+i,cur:false});
  for(let i=1;i<=daysInM;i++) cells.push({day:i,cur:true});
  while(cells.length%7!==0) cells.push({day:cells.length-off-daysInM+1,cur:false});
  const reg=MONTHS_REGISTRY.find(m=>m.year===calYear&&m.month===calMonth);
  const calD=reg?reg.data:D;
  const calDates=new Set(calD.flatMap(e=>e.days.map(d=>d.date).filter(Boolean)));
  let weeksHtml='';
  for(let w=0;w<cells.length/7;w++){
    let rowHtml='';
    for(let dc=0;dc<7;dc++){
      const cell=cells[w*7+dc];
      const ds=cell.cur?`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`:null;
      const calEmpData=calEmp?calD.find(e=>e.name===calEmp.name)||null:null;
      const shiftDay=calEmpData&&ds?calEmpData.days.find(x=>x.date===ds):null;
      const hasShift=!!(shiftDay&&shiftDay.hours>0);
      const isWkndCell=dc>=5,isTodayCell=ds===todayStr,isHolCell=ds?isHoliday(ds):false;
      const isUrlop=calEmp&&ds&&calDates.has(ds)&&!hasShift&&!isHolCell;
      const cls=['cal-cell',!cell.cur?'other-m':'',isTodayCell?'is-today':'',isWkndCell?'is-wknd':'',hasShift?'has-shift':'',isUrlop&&!isWkndCell?'is-urlop':''].filter(Boolean).join(' ');
      let inner=`<div class="cal-dnum">${cell.day}</div>`;
      if(isHolCell&&cell.cur) inner+='<div style="font-size:0.68rem;font-weight:700;color:#DC2626;text-transform:uppercase;margin-top:2px">Święto</div>';
      else if(hasShift) inner+=`<div class="cal-shift-block"><div class="cal-shift-times">${shiftDay.start} – ${shiftDay.end}</div><div class="cal-shift-hours">(${fmtH(shiftDay.hours)})</div></div>`;
      else if(cell.cur&&calEmp){
        if(isWkndCell) inner+='<div class="cal-off-lbl wknd">Wolne</div>';
        else if(calDates.has(ds)) inner+='<div class="cal-urlop-block"><div class="cal-urlop-lbl">Urlop</div></div>';
      }
      rowHtml+=`<div class="${cls}">${inner}</div>`;
    }
    weeksHtml+=`<div class="cal-week">${rowHtml}</div>`;
  }
  return weeksHtml;
}

// ── Urlop Gantt ──
const GANTT_COLORS=['#5B8DB8','#E07B6A','#6BAF8C','#9B7EC8','#D4956A','#5AADB0','#C97A9A','#7A9E6F','#B87B5A','#6E8FC4','#C4A04E','#7BA8A0','#A06B8A','#6B9E7A','#B86B6B','#6B8DB8','#9B8A5A','#7A7EC8'];

function renderUrlop(){
  const y=selYear,mo=selMonth;
  const allDates=[...DATA_DATES].filter(ds=>{const d=pd(ds);return d.getFullYear()===y&&d.getMonth()===mo;}).sort();
  if(!allDates.length){document.getElementById('v-urlop').innerHTML='<div style="padding:48px;text-align:center;color:var(--text-2)">Brak danych.</div>';return;}
  const empData=[];
  D.forEach((emp,idx)=>{
    const segments=[];let segStart=null;
    allDates.forEach(ds=>{
      const day=emp.days.find(x=>x.date===ds);
      const isUrlop=!day||day.hours===0;
      const isWd=pd(ds).getDay()!==0&&pd(ds).getDay()!==6&&!isHoliday(ds);
      if(isUrlop&&isWd){if(!segStart)segStart=ds;}
      else{if(segStart){segments.push({start:segStart,end:allDates[allDates.indexOf(ds)-1]||segStart});segStart=null;}}
    });
    if(segStart)segments.push({start:segStart,end:allDates[allDates.length-1]});
    if(segments.length>0)empData.push({emp,segments,color:GANTT_COLORS[idx%GANTT_COLORS.length]});
  });
  if(!empData.length){document.getElementById('v-urlop').innerHTML='<div style="padding:48px;text-align:center;color:var(--text-2)">Brak urlopów.</div>';return;}
  const mn=MONN[mo]+' '+y;
  const BAR_H=22,BAR_GAP=3,BAR_TOP=40;
  const first=new Date(y,mo,1);
  let off=first.getDay()-1;if(off<0)off=6;
  const daysInM=new Date(y,mo+1,0).getDate();
  const prevDays=new Date(y,mo,0).getDate();
  const cells=[];
  for(let i=0;i<off;i++)cells.push({day:prevDays-off+1+i,cur:false,ds:null});
  for(let i=1;i<=daysInM;i++){const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;cells.push({day:i,cur:true,ds});}
  while(cells.length%7!==0)cells.push({day:cells.length-off-daysInM+1,cur:false,ds:null});
  const weeksHtml=[];
  for(let w=0;w<cells.length/7;w++){
    const weekCells=cells.slice(w*7,(w+1)*7);
    const weekDates=weekCells.map(c=>c.ds);
    const weekBars=[];
    empData.forEach(({emp,segments,color},ei)=>{
      segments.forEach(seg=>{
        if(!weekDates.some(ds=>ds&&ds>=seg.start&&ds<=seg.end))return;
        const colStart=weekDates.findIndex(ds=>ds&&ds>=seg.start&&ds<=seg.end);
        const colEnd=weekDates.reduce((acc,ds,i)=>(ds&&ds>=seg.start&&ds<=seg.end?i:acc),-1);
        weekBars.push({ei,color,name:emp.name,colStart,colEnd,isFirstWeek:weekDates.some(d=>d===seg.start),isLastWeek:weekDates.some(d=>d===seg.end),seg});
      });
    });
    weekBars.sort((a,b)=>a.ei-b.ei);
    const colSlot=new Array(7).fill(0);
    const barSlots=weekBars.map(bar=>{let slot=0;for(let c=bar.colStart;c<=bar.colEnd;c++)slot=Math.max(slot,colSlot[c]);for(let c=bar.colStart;c<=bar.colEnd;c++)colSlot[c]=slot+1;return slot;});
    const maxSlot=Math.max(0,...barSlots)+1;
    const rowHeight=BAR_TOP+maxSlot*(BAR_H+BAR_GAP)+8;
    let dayCellsHtml='';
    weekCells.forEach((cell,ci)=>{
      const isWknd=ci>=5,isTod=cell.ds===todayStr,isHol=cell.ds?isHoliday(cell.ds):false;
      const cls=['ucal-day-cell',!cell.cur?'other-m':'',isTod?'is-today':'',isWknd?'is-wknd':'',isHol?'is-holiday':''].filter(Boolean).join(' ');
      dayCellsHtml+=`<div class="${cls}" style="min-height:${rowHeight}px"><div class="ucal-dnum">${cell.day}</div>${isHol&&cell.cur?'<div class="ucal-holiday-lbl">Święto</div>':''}</div>`;
    });
    let barsHtml='';
    weekBars.forEach((bar,bi)=>{
      const slot=barSlots[bi],top=BAR_TOP+slot*(BAR_H+BAR_GAP);
      const leftPct=(bar.colStart/7)*100,rightPct=((7-bar.colEnd-1)/7)*100;
      const rL=bar.isFirstWeek?'4px':'0',rR=bar.isLastWeek?'4px':'0';
      barsHtml+=`<div class="ucal-abs-bar" style="top:${top}px;left:${leftPct}%;right:${rightPct}%;background:${bar.color};border-radius:${rL} ${rR} ${rR} ${rL}" title="${bar.name}">${bar.name}</div>`;
    });
    weeksHtml.push(`<div class="ucal-week-row" style="min-height:${rowHeight}px"><div class="ucal-day-grid">${dayCellsHtml}</div><div class="ucal-bars-layer">${barsHtml}</div></div>`);
  }
  document.getElementById('v-urlop').innerHTML=`
    <div class="ucal-header-row2">
      <span class="ucal-title">Urlopy</span><span class="ucal-subtitle" style="margin-left:10px">${mn} · ${empData.length} osób na urlopie</span>
      <div style="flex:1"></div>
      <button class="cal-back-btn" onclick="setView(prevView)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Powrót</button>
    </div>
    <div class="ucal-wrap">
      <div class="ucal-header-row">${DOWLBL.map((l,i)=>`<div class="ucal-dow${i>=5?' wknd':''}">${l}</div>`).join('')}</div>
      ${weeksHtml.join('')}
    </div>
    <div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:8px 14px">
      ${empData.map(({emp,color})=>`<div class="ucal-leg-item"><div class="ucal-leg-dot" style="background:${color}"></div>${emp.name}</div>`).join('')}
    </div>`;
}

</script>
</body>
</html>
